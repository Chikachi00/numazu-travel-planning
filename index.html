<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沼津设施查询 & 行程规划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF8;--bg2:#F3F1EC;--bg3:#FFFFFF;
  --text:#2C2C2A;--text2:#6B6B68;--text3:#9A9A97;
  --border:#E4E2DC;--border2:#C8C6C0;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-light:#9FE1CB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-light:#FAC775;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-light:#B5D4F4;
  --pink:#993556;--pink-bg:#FBEAF0;--pink-light:#F4C0D1;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-light:#CECBF6;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-light:#C0DD97;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-light:#F7C1C1;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-light:#D3D1C7;
  --coral:#993C1D;--coral-bg:#FAECE7;--coral-light:#F5C4B3;
  --r:8px;--rl:12px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:14px}

/* LAYOUT */
#header{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:2rem;position:sticky;top:0;z-index:100}
.logo{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:500;padding:1rem 0;white-space:nowrap;color:var(--text)}
.tabs{display:flex;gap:0}
.tab{padding:.8rem 1.1rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:6px;font-weight:400}
.tab.active{border-bottom-color:var(--text);color:var(--text);font-weight:500}
.tab:hover:not(.active){color:var(--text);background:var(--bg2)}
.badge-count{background:var(--teal-bg);color:var(--teal);font-size:11px;padding:1px 6px;border-radius:99px;font-weight:500}

#main{max-width:1100px;margin:0 auto;padding:1.5rem}

/* SEARCH PAGE */
.search-bar{display:flex;gap:.75rem;margin-bottom:1rem;align-items:center}
.search-input{flex:1;padding:.6rem .9rem;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit}
.search-input:focus{outline:none;border-color:var(--teal)}
.filter-row{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.filter-btn{padding:4px 12px;border:1px solid var(--border);border-radius:99px;background:var(--bg3);color:var(--text2);font-size:12px;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--text);color:var(--bg3);border-color:var(--text)}
.result-count{font-size:12px;color:var(--text3);margin-bottom:1rem}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.1rem;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.6rem}
.card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.add-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:12px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.add-btn:hover:not(.added){background:var(--teal-bg);border-color:var(--teal-light);color:var(--teal)}
.add-btn.added{background:var(--green-bg);border-color:var(--green-light);color:var(--green);cursor:default}
.card-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.6rem}
.type-badge{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:400}
.area-badge{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--gray-bg);color:var(--gray)}
.card-info{font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:3px}
.info-row{display:flex;gap:.4rem;align-items:center}
.info-icon{width:14px;text-align:center;color:var(--text3)}
.admission-tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;background:var(--coral-bg);color:var(--coral);margin-top:3px}

/* PLAN PAGE */
.plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.plan-title-group{display:flex;align-items:center;gap:1rem}
.plan-date-input{padding:.45rem .75rem;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit}
.plan-date-input:focus{outline:none;border-color:var(--teal)}
.export-btn{padding:.5rem 1rem;background:var(--text);color:var(--bg3);border:none;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.export-btn:hover{opacity:.85}
.export-btn:disabled{opacity:.4;cursor:default}

.plan-empty{text-align:center;padding:3rem 2rem;color:var(--text3)}
.plan-empty-title{font-size:15px;color:var(--text2);margin-bottom:.5rem}
.plan-empty-sub{font-size:13px}

.plan-items{display:flex;flex-direction:column;gap:.6rem}
.plan-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.1rem}
.plan-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;margin-bottom:.75rem}
.plan-item-left{flex:1;min-width:0}
.plan-item-name{font-size:14px;font-weight:500;margin-bottom:.3rem}
.plan-item-meta{font-size:12px;color:var(--text2);display:flex;gap:.75rem;flex-wrap:wrap}
.remove-btn{padding:4px 8px;border:1px solid var(--border);border-radius:var(--r);background:none;color:var(--text3);font-size:12px;flex-shrink:0}
.remove-btn:hover{background:var(--red-bg);border-color:var(--red-light);color:var(--red)}
.plan-item-inputs{display:grid;grid-template-columns:140px 1fr;gap:.5rem;align-items:center}
.plan-time-input,.plan-note-input{padding:.4rem .65rem;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;width:100%}
.plan-time-input:focus,.plan-note-input:focus{outline:none;border-color:var(--teal)}
.plan-input-label{font-size:12px;color:var(--text3)}

/* Summary bar */
.plan-summary{background:var(--teal-bg);border:1px solid var(--teal-light);border-radius:var(--r);padding:.65rem 1rem;font-size:13px;color:var(--teal);margin-bottom:1rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.summary-item{display:flex;align-items:center;gap:.3rem}

/* Misc */
.no-results{text-align:center;padding:3rem;color:var(--text3)}
@media(max-width:600px){
  #header{gap:1rem;padding:0 1rem}
  #main{padding:1rem}
  .cards{grid-template-columns:1fr}
  .plan-item-inputs{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="header">
  <div class="logo">沼津设施</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('search')" id="tab-search">
      🔍 查询
    </button>
    <button class="tab" onclick="showTab('plan')" id="tab-plan">
      📋 规划 <span class="badge-count" id="plan-count">0</span>
    </button>
  </div>
</div>

<div id="main">
  <!-- SEARCH PAGE -->
  <div id="page-search">
    <div class="search-bar">
      <input class="search-input" type="text" placeholder="搜索设施名称、地区、类型…" id="search-input" oninput="renderCards()">
    </div>
    <div class="filter-row" id="area-filters"></div>
    <div class="filter-row" id="type-filters"></div>
    <div class="result-count" id="result-count"></div>
    <div class="cards" id="cards"></div>
  </div>

  <!-- PLAN PAGE -->
  <div id="page-plan" style="display:none">
    <div class="plan-header">
      <div class="plan-title-group">
        <span style="font-size:15px;font-weight:500">我的行程</span>
        <input class="plan-date-input" type="date" id="plan-date" placeholder="选择日期">
      </div>
      <button class="export-btn" onclick="exportPlan()" id="export-btn">
        ⬇ 导出行程
      </button>
    </div>
    <div id="plan-summary-bar" style="display:none" class="plan-summary"></div>
    <div id="plan-content"></div>
  </div>
</div>

const FACILITIES = RAW.map(r => ({
  id:r[0], name:r[1], area:r[2], type:r[3],
  open:r[4], close:r[5], weekendHours:r[6], closedDays:r[7],
  admission:r[8], weekendAdmission:r[9], notes:r[10]
}));

// ─── STATE ───────────────────────────────────────────────────────────────────
let plan = [];
let activeArea = '';
let activeType = '';
let currentTab = 'search';

// ─── TYPE COLORS ─────────────────────────────────────────────────────────────
const TYPE_STYLE = {
  '温泉':   {bg:'var(--blue-bg)',   color:'var(--blue)',   border:'var(--blue-light)'},
  '公園':   {bg:'var(--green-bg)',  color:'var(--green)',  border:'var(--green-light)'},
  '餐馆':   {bg:'var(--amber-bg)',  color:'var(--amber)',  border:'var(--amber-light)'},
  '甜点':   {bg:'var(--pink-bg)',   color:'var(--pink)',   border:'var(--pink-light)'},
  'Café':   {bg:'var(--purple-bg)', color:'var(--purple)', border:'var(--purple-light)'},
  '参观设施':{bg:'var(--teal-bg)',  color:'var(--teal)',   border:'var(--teal-light)'},
  '商场':   {bg:'var(--gray-bg)',   color:'var(--gray)',   border:'var(--gray-light)'},
  '商店':   {bg:'var(--gray-bg)',   color:'var(--gray)',   border:'var(--gray-light)'},
  '宿泊':   {bg:'var(--blue-bg)',   color:'var(--blue)',   border:'var(--blue-light)'},
  '案内所': {bg:'var(--teal-bg)',   color:'var(--teal)',   border:'var(--teal-light)'},
  '其他':   {bg:'var(--gray-bg)',   color:'var(--gray)',   border:'var(--gray-light)'},
  '杂货':   {bg:'var(--gray-bg)',   color:'var(--gray)',   border:'var(--gray-light)'},
  '神社':   {bg:'var(--red-bg)',    color:'var(--red)',    border:'var(--red-light)'},
  '海辺':   {bg:'var(--blue-bg)',   color:'var(--blue)',   border:'var(--blue-light)'},
  '酒店':   {bg:'var(--blue-bg)',   color:'var(--blue)',   border:'var(--blue-light)'},
};

function typeStyle(t) {
  const s = TYPE_STYLE[t] || {bg:'var(--gray-bg)',color:'var(--gray)',border:'var(--gray-light)'};
  return `background:${s.bg};color:${s.color};border:1px solid ${s.border}`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAreas() {
  return [...new Set(FACILITIES.map(f=>f.area))];
}
function getTypes() {
  return [...new Set(FACILITIES.map(f=>f.type))].sort();
}
function isInPlan(id) { return plan.some(p=>p.id===id); }

function getFiltered() {
  const q = document.getElementById('search-input')?.value.toLowerCase() || '';
  return FACILITIES.filter(f => {
    const matchQ = !q || f.name.toLowerCase().includes(q) || f.area.includes(q) || f.type.includes(q) || (f.notes||'').includes(q);
    const matchArea = !activeArea || f.area === activeArea;
    const matchType = !activeType || f.type === activeType;
    return matchQ && matchArea && matchType;
  });
}

// ─── RENDER: FILTERS ─────────────────────────────────────────────────────────
function renderFilters() {
  const areas = getAreas();
  const types = getTypes();

  const areaContainer = document.getElementById('area-filters');
  areaContainer.innerHTML = `<span class="filter-label">地区：</span>
    <button class="filter-btn ${!activeArea?'active':''}" onclick="setArea('')">全部</button>
    ${areas.map(a=>`<button class="filter-btn ${activeArea===a?'active':''}" onclick="setArea('${a}')">${a}</button>`).join('')}`;

  const typeContainer = document.getElementById('type-filters');
  typeContainer.innerHTML = `<span class="filter-label">类型：</span>
    <button class="filter-btn ${!activeType?'active':''}" onclick="setType('')">全部</button>
    ${types.map(t=>`<button class="filter-btn ${activeType===t?'active':''}" onclick="setType('${t}')">${t}</button>`).join('')}`;
}

function setArea(a) { activeArea = a; renderFilters(); renderCards(); }
function setType(t) { activeType = t; renderFilters(); renderCards(); }

// ─── RENDER: CARDS ───────────────────────────────────────────────────────────
function renderCards() {
  const filtered = getFiltered();
  const container = document.getElementById('cards');
  const countEl = document.getElementById('result-count');
  countEl.textContent = `共 ${filtered.length} 个设施`;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">未找到相关设施</div>';
    return;
  }

  container.innerHTML = filtered.map(f => {
    const inPlan = isInPlan(f.id);
    const hasHours = f.open && f.close;
    const hasAdmission = f.admission !== null && f.admission !== undefined;
    const isFree = f.admission === 0;

    return `<div class="card facility-card">
      <div class="card-top">
        <div class="card-name">${f.name}</div>
        <button class="add-btn ${inPlan?'added':''}" onclick="togglePlan(${f.id})" ${inPlan?'disabled':''}>
          ${inPlan ? '✓ 已加入' : '+ 加入规划'}
        </button>
      </div>
      <div class="card-tags">
        <span class="type-badge" style="${typeStyle(f.type)}">${f.type}</span>
        <span class="area-badge">${f.area}</span>
      </div>
      <div class="card-info">
        ${hasHours ? `<div class="info-row"><span class="info-icon">🕐</span><span>${f.open} ～ ${f.close}${f.weekendHours?` (周末:${f.weekendHours})`:''}` +
          (f.closedDays && f.closedDays!=='無'?` ｜ 定休：${f.closedDays}`:'')+`</span></div>` : ''}
        ${f.closedDays && !hasHours && f.closedDays!=='無' ? `<div class="info-row"><span class="info-icon">🚫</span><span>定休：${f.closedDays}</span></div>` : ''}
        ${hasAdmission && !isFree ? `<span class="admission-tag">¥${f.admission}${f.weekendAdmission && f.weekendAdmission!==f.admission?' (周末¥'+f.weekendAdmission+')':''}</span>` : ''}
        ${isFree ? `<span class="admission-tag" style="background:var(--green-bg);color:var(--green)">免费</span>` : ''}
        ${f.notes ? `<div class="info-row" style="margin-top:3px"><span class="info-icon">ℹ</span><span style="color:var(--text3)">${f.notes}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ─── RENDER: PLAN ────────────────────────────────────────────────────────────
function renderPlan() {
  const countEl = document.getElementById('plan-count');
  countEl.textContent = plan.length;

  if (currentTab !== 'plan') return;

  const exportBtn = document.getElementById('export-btn');
  exportBtn.disabled = plan.length === 0;

  const summaryBar = document.getElementById('plan-summary-bar');
  const content = document.getElementById('plan-content');

  if (plan.length === 0) {
    summaryBar.style.display = 'none';
    content.innerHTML = `<div class="plan-empty">
      <div class="plan-empty-title">行程为空</div>
      <div class="plan-empty-sub">前往「查询」页面，将感兴趣的设施加入规划</div>
    </div>`;
    return;
  }

  // Summary
  const totalAdmission = plan.reduce((sum,p)=>(p.admission||0)+sum, 0);
  const types = [...new Set(plan.map(p=>p.type))].join(' · ');
  summaryBar.style.display = 'flex';
  summaryBar.innerHTML = `
    <div class="summary-item">📍 ${plan.length} 个设施</div>
    ${totalAdmission > 0 ? `<div class="summary-item">🎟 门票合计 ¥${totalAdmission}</div>` : ''}
    <div class="summary-item">🗂 ${types}</div>
  `;

  content.innerHTML = `<div class="plan-items">
    ${plan.map((f,i) => `
    <div class="plan-item">
      <div class="plan-item-top">
        <div class="plan-item-left">
          <div class="plan-item-name">${i+1}. ${f.name}</div>
          <div class="plan-item-meta">
            <span class="type-badge" style="${typeStyle(f.type)};font-size:11px;padding:1px 7px">${f.type}</span>
            <span style="color:var(--text2)">${f.area}</span>
            ${f.open ? `<span style="color:var(--text3)">🕐 ${f.open}～${f.close}</span>` : ''}
            ${f.admission > 0 ? `<span style="color:var(--coral)">¥${f.admission}</span>` : ''}
          </div>
        </div>
        <button class="remove-btn" onclick="removeFromPlan(${f.id})">✕ 删除</button>
      </div>
      <div class="plan-item-inputs">
        <div>
          <div class="plan-input-label" style="margin-bottom:3px">预计到访时间</div>
          <input class="plan-time-input" type="time" value="${f.planTime||''}" onchange="updatePlanItem(${f.id},'planTime',this.value)">
        </div>
        <div>
          <div class="plan-input-label" style="margin-bottom:3px">备注</div>
          <input class="plan-note-input" type="text" placeholder="添加备注…" value="${f.planNote||''}" oninput="updatePlanItem(${f.id},'planNote',this.value)">
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function togglePlan(id) {
  if (!isInPlan(id)) {
    const f = FACILITIES.find(f=>f.id===id);
    if (f) plan.push({...f, planTime:'', planNote:''});
  }
  renderCards();
  renderPlan();
}

function removeFromPlan(id) {
  plan = plan.filter(p=>p.id!==id);
  renderCards();
  renderPlan();
}

function updatePlanItem(id, field, value) {
  const item = plan.find(p=>p.id===id);
  if (item) item[field] = value;
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('page-search').style.display = tab==='search' ? '' : 'none';
  document.getElementById('page-plan').style.display = tab==='plan' ? '' : 'none';
  document.getElementById('tab-search').className = 'tab' + (tab==='search'?' active':'');
  document.getElementById('tab-plan').className = 'tab' + (tab==='plan'?' active':'');
  if (tab==='plan') renderPlan();
}

function exportPlan() {
  const date = document.getElementById('plan-date').value || '';
  const lines = [
    '═'.repeat(36),
    `  沼津行程规划  ${date}`,
    '═'.repeat(36),
    '',
    ...plan.map((f,i) => {
      const rows = [`${i+1}. ${f.name} [${f.type}]`, `   📍 ${f.area}`];
      if (f.planTime) rows.push(`   🕐 到访时间：${f.planTime}`);
      if (f.open && f.close) rows.push(`   营业时间：${f.open} ～ ${f.close}`);
      if (f.closedDays && f.closedDays!=='無') rows.push(`   定休日：${f.closedDays}`);
      if (f.admission > 0) rows.push(`   门票：¥${f.admission}${f.weekendAdmission&&f.weekendAdmission!==f.admission?' / 周末¥'+f.weekendAdmission:''}`);
      if (f.notes) rows.push(`   备注：${f.notes}`);
      if (f.planNote) rows.push(`   个人备注：${f.planNote}`);
      rows.push('');
      return rows.join('\n');
    }),
    '─'.repeat(36),
    `合计 ${plan.length} 个设施  门票共 ¥${plan.reduce((s,p)=>s+(p.admission||0),0)}`,
  ];
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `沼津行程_${date||'未命名'}.txt`; a.click();
  URL.revokeObjectURL(url);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderFilters();
renderCards();
</script>
