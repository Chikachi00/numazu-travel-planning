<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--bg2:#EEEAE2;--surface:#FFFFFF;
  --text:#1E1E1C;--text2:#6A6A66;--text3:#A8A8A4;
  --border:#E2DED6;--border2:#C8C4BC;
  --open:#1D9E75;--open-bg:#E1F5EE;--open-border:#9FE1CB;
  --closed:#D85A30;--closed-bg:#FAECE7;--closed-border:#F5C4B3;
  --maybe:#BA7517;--maybe-bg:#FAEEDA;--maybe-border:#FAC775;
  --r:8px;--rl:12px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
button{cursor:pointer;font-family:inherit;font-size:14px}

#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.site-title{font-size:15px;font-weight:500}

#date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap}
.date-group{display:flex;align-items:center;gap:.5rem}
#date-input{padding:.5rem .8rem;border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:inherit;color:var(--text);background:var(--bg);cursor:pointer}
#date-input:focus{outline:none;border-color:var(--open)}
.today-btn{padding:.45rem .85rem;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text2);font-size:13px}
.today-btn:hover{background:var(--bg2)}
#day-display{font-size:20px;font-weight:500}
.day-pill{display:inline-block;font-size:12px;padding:3px 10px;border-radius:99px;margin-left:.4rem;vertical-align:middle;font-weight:400}
.day-pill.we{background:var(--closed-bg);color:var(--closed)}
.day-pill.wd{background:var(--open-bg);color:var(--open)}
#stats{display:flex;gap:1rem;margin-left:auto;flex-wrap:wrap}
.stat{font-size:13px;display:flex;align-items:center;gap:.35rem;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

#filters{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
#search{padding:.42rem .75rem;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);min-width:180px}
#search:focus{outline:none;border-color:var(--open)}
.sep{width:1px;height:18px;background:var(--border);margin:0 .2rem;flex-shrink:0}
.chip{padding:3px 10px;border:1px solid var(--border);border-radius:99px;background:var(--surface);color:var(--text2);font-size:12px;white-space:nowrap;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--text);color:var(--surface);border-color:var(--text)}

#main{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem}
.sec-label{font-size:12px;color:var(--text3);margin-bottom:.55rem;letter-spacing:.04em}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:.6rem;margin-bottom:1.4rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:.9rem 1rem;transition:border-color .12s}
.card:hover{border-color:var(--border2)}
.card.dim{background:var(--bg);opacity:.68}
.card.dim .cname{color:var(--text2)}

.cheader{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.45rem}
.cname{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.sbadge{font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.s-open{background:var(--open-bg);color:var(--open);border:1px solid var(--open-border)}
.s-closed{background:var(--closed-bg);color:var(--closed);border:1px solid var(--closed-border)}
.s-maybe{background:var(--maybe-bg);color:var(--maybe);border:1px solid var(--maybe-border)}
.s-unk{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}

.ctags{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.45rem}
.ttag{font-size:11px;padding:2px 7px;border-radius:99px}
.atag{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--bg2);color:var(--text2)}

.chours{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:.3rem}
.chours.hi{color:var(--open);font-weight:500}
.crest{font-size:12px;color:var(--text3);margin-top:2px}
.ptag{display:inline-block;margin-top:.35rem;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--closed-bg);color:var(--closed)}
.ftag{display:inline-block;margin-top:.35rem;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--open-bg);color:var(--open)}
.cnote{font-size:11px;color:var(--text3);margin-top:.2rem}

.empty{text-align:center;padding:3rem;color:var(--text3)}
@media(max-width:580px){
  #date-bar{padding:.75rem 1rem;gap:.75rem}
  #filters{padding:.6rem 1rem}
  #main{padding:1rem}
  #day-display{font-size:17px}
  #stats{margin-left:0}
}
</style>
</head>

const FS=RAW.map(r=>({id:r[0],name:r[1],area:r[2],type:r[3],open:r[4],close:r[5],wkH:r[6],cd:r[7],price:r[8],wkPrice:r[9],note:r[10]}));

// ── 星期判断 ──────────────────────────────────────────────────────────────────
const JPDAYS=['日','月','火','水','木','金','土'];
const ZHDAYS=['周日','周一','周二','周三','周四','周五','周六'];

function status(f,date){
  if(!date) return 'unk';
  const cd=f.cd;
  if(!f.open&&!cd) return 'unk';
  if(!cd||cd==='無') return 'open';
  if(/不定休|荒天|维护|維護/.test(cd)) return 'maybe';
  const dow=date.getDay();
  const dc=JPDAYS[dow];
  // 第N曜 pattern
  let s=cd;
  const re=/(?:第)?(\d)(?:[・,](\d))?([月火水木金土日])曜?/g;
  let m;
  while((m=re.exec(cd))!==null){
    if(m[3]===dc){
      const nth=Math.ceil(date.getDate()/7);
      if(nth===+m[1]||(m[2]&&nth===+m[2])) return 'closed';
    }
    s=s.replace(m[0],'');
  }
  // 范围 月~金
  const rm=s.match(/([月火水木金土日])~([月火水木金土日])/);
  if(rm){
    const a=JPDAYS.indexOf(rm[1]),b=JPDAYS.indexOf(rm[2]);
    const hit=a<=b?(dow>=a&&dow<=b):(dow>=a||dow<=b);
    if(hit) return 'closed';
    s=s.replace(rm[0],'');
  }
  if(s.includes(dc)) return 'closed';
  return 'open';
}

// 定休日日文→中文
function cdZh(cd){
  if(!cd||cd==='無') return '';
  let s=cd;
  s=s.replace(/(?:第)?(\d)(?:[・,](\d))?([月火水木金土日])曜?/g,(_,n1,n2,d)=>{
    const zh={月:'周一',火:'周二',水:'周三',木:'周四',金:'周五',土:'周六',日:'周日'}[d]||d;
    return n2?`每月第${n1}・${n2}${zh}`:`每月第${n1}${zh}`;
  });
  const m={月:'周一',火:'周二',水:'周三',木:'周四',金:'周五',土:'周六',日:'周日'};
  for(const[k,v] of Object.entries(m)) s=s.split(k).join(v);
  return s.replace(/[・/]/g,' / ').replace(/祝/g,'节假日').replace(/\s+/g,' ').trim();
}

// ── 别名映射（店名罗马字 / 英文 → 日文匹配） ─────────────────────────────────
const ALIASES={
  'グランマ':['grandma'],
};
function searchText(f){
  let s=[f.name,f.area,f.type,f.note||''].join(' ').toLowerCase();
  for(const[jp,alts] of Object.entries(ALIASES)){
    if(f.name.includes(jp)) s+=' '+alts.join(' ');
  }
  return s;
}

// ── 类型颜色 ──────────────────────────────────────────────────────────────────
const TC={温泉:'#E6F1FB,#185FA5',公園:'#EAF3DE,#3B6D11',餐馆:'#FAEEDA,#854F0B',
甜点:'#FBEAF0,#993556','Café':'#EEEDFE,#534AB7',参观:'#E1F5EE,#0F6E56',
商场:'#F1EFE8,#5F5E5A',商店:'#F1EFE8,#5F5E5A',宿泊:'#E6F1FB,#185FA5',
案内所:'#E1F5EE,#0F6E56',其他:'#F1EFE8,#5F5E5A',杂货:'#F1EFE8,#5F5E5A',
神社:'#FCEBEB,#A32D2D',海辺:'#E6F1FB,#185FA5'};
function ts(t){const[bg,c]=(TC[t]||'#F1EFE8,#5F5E5A').split(',');return`background:${bg};color:${c}`;}

// ── 状态 ──────────────────────────────────────────────────────────────────────
let SA='',ST='',SD=null;

// ── 筛选器 ────────────────────────────────────────────────────────────────────
function initFilters(){
  const areas=[...new Set(FS.map(f=>f.area))];
  const types=[...new Set(FS.map(f=>f.type))].sort();
  document.getElementById('area-row').innerHTML=
    `<button class="chip on" onclick="setA('')">全部地区</button>`+
    areas.map(a=>`<button class="chip" onclick="setA('${a}')">${a}</button>`).join('');
  document.getElementById('type-row').innerHTML=
    `<button class="chip on" onclick="setT('')">全部类型</button>`+
    types.map(t=>`<button class="chip" onclick="setT('${t}')">${t}</button>`).join('');
}
function setA(a){
  SA=a;
  document.querySelectorAll('#area-row .chip').forEach(b=>{
    const ba=b.textContent==='全部地区'?'':b.textContent;
    b.className='chip'+(ba===SA?' on':'');
  });
  render();
}
function setT(t){
  ST=t;
  document.querySelectorAll('#type-row .chip').forEach(b=>{
    const bt=b.textContent==='全部类型'?'':b.textContent;
    b.className='chip'+(bt===ST?' on':'');
  });
  render();
}

// ── 日期 ──────────────────────────────────────────────────────────────────────
function setToday(){
  const t=new Date();
  document.getElementById('date-input').value=t.toISOString().slice(0,10);
  SD=t; updateDay(); render();
}
function onDateChange(){
  const v=document.getElementById('date-input').value;
  if(!v){SD=null;updateDay();render();return;}
  const[y,mo,d]=v.split('-').map(Number);
  SD=new Date(y,mo-1,d);
  updateDay(); render();
}
function updateDay(){
  const dd=document.getElementById('day-display');
  const dp=document.getElementById('day-pill');
  if(!SD){dd.textContent='请选择日期';dp.textContent='';dp.className='day-pill';return;}
  const dow=SD.getDay();
  dd.textContent=`${SD.getFullYear()}年${SD.getMonth()+1}月${SD.getDate()}日`;
  dp.textContent=ZHDAYS[dow];
  dp.className='day-pill '+(dow===0||dow===6?'we':'wd');
}

// ── 卡片 ──────────────────────────────────────────────────────────────────────
function card(f,st){
  const closed=st==='closed';
  const isWE=SD&&(SD.getDay()===0||SD.getDay()===6);
  const hrs=isWE&&f.wkH?f.wkH:(f.open&&f.close?`${f.open} ～ ${f.close}`:null);
  const rest=cdZh(f.cd);
  const sb={open:'<span class="sbadge s-open">开门</span>',
            closed:'<span class="sbadge s-closed">今日定休</span>',
            maybe:'<span class="sbadge s-maybe">不定休</span>',
            unk:'<span class="sbadge s-unk">待确认</span>'}[st]||'';
  return`<div class="card${closed?' dim':''}">
  <div class="cheader"><div class="cname">${f.name}</div>${SD?sb:''}</div>
  <div class="ctags"><span class="ttag" style="${ts(f.type)}">${f.type}</span><span class="atag">${f.area}</span></div>
  ${hrs?`<div class="chours${!closed&&SD?' hi':''}">${hrs}${isWE&&f.wkH?' <span style="font-size:10px;opacity:.7">(周末)</span>':''}</div>`:''}
  ${rest?`<div class="crest">定休：${rest}</div>`:''}
  ${f.price>0?`<span class="ptag">¥${f.price}${f.wkPrice&&f.wkPrice!==f.price?' / 周末¥'+f.wkPrice:''}</span>`:''}
  ${f.price===0?`<span class="ftag">免费</span>`:''}
  ${f.note?`<div class="cnote">${f.note}</div>`:''}
</div>`;
}

// ── 渲染 ──────────────────────────────────────────────────────────────────────
function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const all=FS.filter(f=>{
    const mq=!q||searchText(f).includes(q);
    return mq&&(!SA||f.area===SA)&&(!ST||f.type===ST);
  });
  const ws=all.map(f=>({f,s:status(f,SD)}));
  // 统计
  const statsEl=document.getElementById('stats');
  if(SD){
    const no=ws.filter(x=>x.s==='open').length;
    const nc=ws.filter(x=>x.s==='closed').length;
    const nm=ws.filter(x=>x.s==='maybe').length;
    const nu=ws.filter(x=>x.s==='unk').length;
    statsEl.innerHTML=
      `<div class="stat"><span class="dot" style="background:var(--open)"></span>${no} 家开门</div>`+
      `<div class="stat"><span class="dot" style="background:var(--closed)"></span>${nc} 家定休</div>`+
      (nm?`<div class="stat"><span class="dot" style="background:var(--maybe)"></span>${nm} 家不定休</div>`:'')+
      (nu?`<div class="stat"><span class="dot" style="background:var(--text3)"></span>${nu} 家待确认</div>`:'');
  } else {
    statsEl.innerHTML=`<div class="stat" style="color:var(--text3)">选择日期后显示营业状态</div>`;
  }
  const op=ws.filter(x=>x.s!=='closed');
  const cl=ws.filter(x=>x.s==='closed');
  const os=document.getElementById('sec-open');
  const cs=document.getElementById('sec-closed');
  if(!SD){
    os.innerHTML=all.length?`<div class="cards">${all.map(f=>card(f,'unk')).join('')}</div>`:'<div class="empty">未找到相关设施</div>';
    cs.innerHTML='';return;
  }
  os.innerHTML=op.length?`<div class="sec-label">开门 / 待确认 · ${op.length} 家</div><div class="cards">${op.map(({f,s})=>card(f,s)).join('')}</div>`:'';
  cs.innerHTML=cl.length?`<div class="sec-label">今日定休 · ${cl.length} 家</div><div class="cards">${cl.map(({f,s})=>card(f,s)).join('')}</div>`:'';
}

initFilters();
setToday();
</script>
